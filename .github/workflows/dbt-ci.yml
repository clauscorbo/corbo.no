name: dbt CI (slim)

on:
  workflow_call:
    secrets:
      DBT_PASSWORD:
        required: true

jobs:
  dbt-slim-ci:
    name: dbt slim CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/dbtproject_corbo

    steps:
      # 1. Checkout PR branch
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            dbt/requirements.txt
            load/requirements.txt

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Install load dependencies
        run: pip install -r ../../load/requirements.txt

      - name: Create profiles.yml
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          python -c "
          import yaml, os
          profiles = {
              'dbtproject_corbo': {
                  'target': 'ci',
                  'outputs': {
                      'ci': {
                          'type': 'postgres',
                          'host': 'ep-falling-hall-a90j0106-pooler.gwc.azure.neon.tech',
                          'dbname': 'ci',
                          'user': 'neondb_owner',
                          'password': os.environ['DBT_PASSWORD'],
                          'port': 5432,
                          'schema': 'ci',
                          'threads': 4,
                          'sslmode': 'require',
                      }
                  }
              }
          }
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              yaml.dump(profiles, f, default_flow_style=False)
          "

      # 2. Checkout prod branch and compile to get baseline state
      - name: Checkout prod branch for baseline state
        uses: actions/checkout@v4
        with:
          ref: prod
          path: prod-branch

      - name: Compile dbt on prod branch (baseline)
        run: dbt compile --target-path=prod-run-artifacts
        working-directory: prod-branch/dbt/dbtproject_corbo

      # 3. Copy baseline artifacts back to PR branch
      - name: Copy prod state artifacts
        run: cp -r ${{ github.workspace }}/prod-branch/dbt/dbtproject_corbo/prod-run-artifacts ./prod-run-artifacts

      # 3b. Selective load
      - name: Selective load
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
          LOAD_TARGET: ci
        run: |
          SOURCES=$(dbt ls --resource-types source --select +state:modified+ \
            --defer --state=prod-run-artifacts --target ci \
            --output json --quiet \
            | python -c "
          import sys, json
          tables = []
          for line in sys.stdin:
              line = line.strip()
              if not line: continue
              try:
                  node = json.loads(line)
              except json.JSONDecodeError:
                  continue
              if node.get('resource_type') == 'source':
                  tables.append(node['unique_id'].rsplit('.', 1)[-1])
          print(' '.join(sorted(set(tables))))
          ")

          if [ -z "$SOURCES" ]; then
            echo "No upstream sources found for modified models. Skipping load."
          else
            echo "Loading sources: $SOURCES"
            python ../../load/run_all.py $SOURCES
          fi

      # 4. Run only modified models on PR branch
      - name: dbt build (modified only)
        run: dbt build --select state:modified+ --defer --state=prod-run-artifacts --target ci
