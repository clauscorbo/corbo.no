name: dbt CD (slim)

on:
  push:
    branches: [prod]
    paths:
      - "dbt/**"

jobs:
  dbt-deploy:
    name: dbt slim CD (prod)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/dbtproject_corbo

    steps:
      # 1. Checkout current prod (after merge)
      - name: Checkout prod (current)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r ../requirements.txt

      - name: Create profiles.yml
        env:
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: |
          mkdir -p ~/.dbt
          python -c "
          import yaml, os
          profiles = {
              'dbtproject_corbo': {
                  'target': 'prod',
                  'outputs': {
                      'prod': {
                          'type': 'postgres',
                          'host': 'ep-falling-hall-a90j0106-pooler.gwc.azure.neon.tech',
                          'dbname': 'prod',
                          'user': 'neondb_owner',
                          'password': os.environ['DBT_PASSWORD'],
                          'port': 5432,
                          'schema': 'prod',
                          'threads': 4,
                          'sslmode': 'require',
                      }
                  }
              }
          }
          with open(os.path.expanduser('~/.dbt/profiles.yml'), 'w') as f:
              yaml.dump(profiles, f, default_flow_style=False)
          "

      # 2. Compile baseline state from the commit before merge
      - name: Checkout previous prod state
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.before }}
          path: prod-previous

      - name: Compile dbt on previous prod (baseline)
        run: dbt compile --target-path=prod-run-artifacts
        working-directory: prod-previous/dbt/dbtproject_corbo

      # 3. Copy baseline artifacts to current checkout
      - name: Copy previous state artifacts
        run: cp -r ${{ github.workspace }}/prod-previous/dbt/dbtproject_corbo/prod-run-artifacts ./prod-run-artifacts

      # 4. Run only modified models on prod
      - name: dbt build (modified only)
        run: dbt build --select state:modified+ --defer --state=prod-run-artifacts --target prod
