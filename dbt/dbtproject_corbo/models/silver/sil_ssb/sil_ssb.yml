version: 2

models:
  - name: sil_ssb_population
    description: "National population statistics per year. Pivots SSB table 05803 metrics into columns covering births, deaths, migration, marriages, and rates."
    columns:
      - name: year
        description: "Calendar year (integer)."
      - name: population_jan1
        description: "Total population as of 1 January."
      - name: livebirths_total
        description: "Total number of live births during the year."
      - name: livebirths_out_of_wedlock
        description: "Number of live births outside of marriage."
      - name: late_fetal_deaths
        description: "Number of late fetal deaths (stillbirths)."
      - name: deaths_total
        description: "Total number of deaths during the year."
      - name: deaths_under_1yr
        description: "Number of deaths of children under 1 year old."
      - name: marriages_contracted
        description: "Number of marriages contracted during the year."
      - name: divorces
        description: "Number of divorces during the year."
      - name: in_migration
        description: "Number of persons immigrating into Norway."
      - name: emigration
        description: "Number of persons emigrating from Norway."
      - name: livebirth_rate_per_1000
        description: "Live births per 1 000 population."
      - name: death_rate_per_1000
        description: "Deaths per 1 000 population."
      - name: population_increase_abs
        description: "Absolute population increase during the year."
      - name: population_increase_pct
        description: "Population increase as a percentage."

  - name: sil_ssb_population_by_age
    description: "Population count per year, one-year age group, and sex. Source: SSB table 10211."
    columns:
      - name: year
        description: "Calendar year (integer)."
      - name: age
        description: "Age as a string, e.g. '0', '1', ..., '105+'."
      - name: sex
        description: "Sex category, e.g. 'Males', 'Females'."
      - name: persons
        description: "Number of persons for the given year, age, and sex."

  - name: sil_ssb_population_by_marital_status
    description: "Population count per year, sex, and marital status. Source: SSB table 05813."
    columns:
      - name: year
        description: "Calendar year (integer)."
      - name: sex
        description: "Sex category, e.g. 'Males', 'Females'."
      - name: marital_status
        description: "Marital status, e.g. 'Unmarried', 'Married', 'Widowed/widower', 'Divorced', 'Separated'."
      - name: persons
        description: "Number of persons for the given year, sex, and marital status."

  - name: sil_ssb_election_votes
    description: "Storting election valid votes per region, party, and election year. Pivots SSB table 08092 into vote count and percentage columns."
    columns:
      - name: region
        description: "Electoral district or region name."
      - name: party
        description: "Name of the political party."
      - name: election_year
        description: "Election year (integer, every 4th year)."
      - name: valid_votes
        description: "Number of valid votes cast for the party in the region."
      - name: valid_votes_pct
        description: "Valid votes as a percentage of total valid votes in the region."

  - name: sil_ssb_election_representatives
    description: "Elected representatives per region, party, sex, and election year. Source: SSB table 08219."
    columns:
      - name: region
        description: "Electoral district or region name."
      - name: sex
        description: "Sex category, e.g. 'Males', 'Females'."
      - name: party
        description: "Name of the political party or electoral list."
      - name: election_year
        description: "Election year (integer, every 4th year)."
      - name: representatives
        description: "Number of elected representatives."

  - name: sil_ssb_election_voters
    description: "General election voter percentage per party, sex, and election year. Source: SSB table 09624."
    columns:
      - name: party
        description: "Name of the political party."
      - name: sex
        description: "Sex category, e.g. 'Males', 'Females'."
      - name: election_year
        description: "Election year (integer, every 4th year)."
      - name: voters_pct
        description: "Percentage of voters who voted for this party, broken down by sex."

  - name: sil_ssb_election_party_support
    description: "General election party support by education level, sex, and election year. Source: SSB table 13555."
    columns:
      - name: party
        description: "Name of the political party."
      - name: education_level
        description: "Education level, e.g. 'Basic school', 'Upper secondary education', 'University and college, short', 'University and college, long'."
      - name: sex
        description: "Sex category, e.g. 'Males', 'Females'."
      - name: election_year
        description: "Election year (integer, every 4th year)."
      - name: support_pct
        description: "Percentage of support for the party among voters with this education level and sex."

  - name: sil_ssb_names_born
    description: "Persons born with a given first name per year. Pivots SSB table 10467 into count and percentage columns."
    columns:
      - name: first_name
        description: "The first name."
      - name: year
        description: "Calendar year (integer)."
      - name: born_persons
        description: "Number of persons born with this name in the given year."
      - name: born_persons_pct
        description: "Percentage of all born persons given this name in the given year."

  - name: sil_ssb_names_living
    description: "Living persons with a given first name per year. Source: SSB table 10501."
    columns:
      - name: first_name
        description: "The first name."
      - name: year
        description: "Calendar year (integer)."
      - name: persons
        description: "Number of living persons with this name in the given year."
