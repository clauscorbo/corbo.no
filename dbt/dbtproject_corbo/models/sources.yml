version: 2

sources:
  - name: staging
    schema: "{{ get_staging_schema() }}"
    description: "Raw data loaded by Python load scripts into the staging schema."
    tables:
      - name: orders
        description: "Raw orders loaded from source systems."
        columns:
          - name: order_id
            description: "Unique order identifier."
          - name: customer_name
            description: "Name of the customer."
          - name: product
            description: "Product ordered."
          - name: quantity
            description: "Quantity ordered."
          - name: unit_price
            description: "Price per unit."
          - name: order_date
            description: "Date the order was placed."
          - name: status
            description: "Order status (completed, pending, cancelled)."
          - name: loaded_at
            description: "Timestamp when the row was loaded."
